<!DOCTYPE html>
<html>
<head>
    <title>Spam Classifier</title>

    <style>
        body {
            background-color: #f5f5f5;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background-color: rgb(184, 184, 188);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.2);
            text-align: center;
            width: 400px;
        }

        h1 {
            font-weight: bold;
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            border: 3px solid black;
            border-radius: 8px;
            padding: 10px;
            font-size: 16px;
            resize: none;
        }
        button {
            background-color: black;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 15px;
        }

        button:hover {
            background-color: #333;
        }

        .result {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
        }

        .spam {
            color: red;
        }

        .not-spam {
            color: green;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>Email/SMS Spam Classifier</h1>

    <form action="/predict" method="post">
        <textarea name="message" rows="5" placeholder="Enter message here"></textarea>
        <br>
        <button type="submit">Predict</button>
    </form>

    {% if prediction %}
        <div class="result 
            {% if prediction == 'Spam' %} spam 
            {% else %} not-spam 
            {% endif %}">
            
            {% if prediction == "Spam" %}
                🚫 Spam
            {% else %}
                ✅ Not Spam
            {% endif %}
        </div>
    {% endif %}
</div>

</body>
</html>
